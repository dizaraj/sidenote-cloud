<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideNote Cloud</title>
    <link rel="stylesheet" href="sidebar.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Header -->
    <header class="glass-header">
        <h1>SideNote</h1>
        <div class="header-actions">
            <button id="fabAddNote" class="icon-btn" title="Add Note">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            </button>
            <button id="settingsBtn" class="icon-btn" title="Settings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
            </button>
        </div>
    </header>

    <!-- Views Container -->
    <main id="mainContent">

        <!-- List View -->
        <div id="listView" class="view active">
            <div class="tabs-container">
                <button id="tabActive" class="tab-btn active">Active</button>
                <button id="tabArchived" class="tab-btn">Archived</button>
            </div>

            <div id="offlineBanner" class="offline-banner hidden">
                Not connected to Supabase. Notes saving locally only.
            </div>

            <div id="notesList" class="notes-container">
                <!-- Notes dynamically injected here -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state hidden">
                <div class="empty-icon">📝</div>
                <p>No notes yet</p>
                <p class="subtitle">Click the + button at the top to create one.</p>
            </div>
        </div>

        <!-- Create/Edit View -->
        <div id="editorView" class="view hidden">
            <div class="editor-header">
                <button id="btnBack" class="icon-btn-text">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                    Back
                </button>
                <div class="editor-actions">
                    <div id="syncStatus" class="tag tag-pending" style="margin-right: 8px;">New Note</div>
                    <button id="btnArchive" class="icon-btn hidden" title="Archive / Unarchive">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="21 8 21 21 3 21 3 8"></polyline>
                            <rect x="1" y="3" width="22" height="5"></rect>
                            <line x1="10" y1="12" x2="14" y2="12"></line>
                        </svg>
                    </button>
                    <button id="btnDelete" class="icon-btn btn-danger hidden" title="Delete Note">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                            </path>
                            <line x1="10" y1="11" x2="10" y2="17"></line>
                            <line x1="14" y1="11" x2="14" y2="17"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="editor-content">
                <input type="text" id="noteTitle" class="input-title" placeholder="Note Title...">
                <textarea id="noteBody" class="input-body" placeholder="Write your note here..."></textarea>

                <div class="urls-section">
                    <div class="urls-header">
                        <h3>Links</h3>
                        <button id="btnAddUrl" class="btn-sm">Add URL</button>
                    </div>
                    <div id="urlsList" class="urls-list">
                        <!-- URL inputs injected here -->
                    </div>
                </div>
            </div>

            <div class="editor-footer">
                <button id="btnSaveNote" class="btn-primary w-full">Save & Sync Note</button>
            </div>
        </div>

    </main>

    <!-- App Footer -->
    <footer class="app-footer">
        <div class="stars-container">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#fbbf24" stroke="none">
                <polygon
                    points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                </polygon>
            </svg>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#fbbf24" stroke="none">
                <polygon
                    points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                </polygon>
            </svg>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#fbbf24" stroke="none">
                <polygon
                    points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                </polygon>
            </svg>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#fbbf24" stroke="none">
                <polygon
                    points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                </polygon>
            </svg>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#fbbf24" stroke="none">
                <polygon
                    points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                </polygon>
            </svg>
        </div>
        <a href="#" class="review-btn" target="_blank">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon
                    points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                </polygon>
            </svg>
            Leave a Review
        </a>
        <div class="footer-links">
            <a href="https://dizaraj.github.io/" target="_blank">Developer</a>
            <a href="https://coff.ee/dizaraj" target="_blank">Donate</a>
        </div>
    </footer>

    <!-- Error/Toast -->
    <div id="toast" class="toast hidden"></div>

    <script src="sidebar.js"></script>
</body>

</html>
